<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Kalkulačka - Robustní verze</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <style>
        body { margin: 0; padding: 10px; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #app { display: flex; height: 90vh; gap: 10px; }
        #panel { width: 350px; background: #f0f0f0; padding: 15px; overflow-y: auto; }
        #map { flex-grow: 1; border: 2px solid #ccc; }
        .error-log { color: red; font-weight: bold; margin: 10px 0; padding: 5px; border: 1px solid red; }
        .success-log { color: green; margin: 10px 0; }
        input { width: 90%; margin-bottom: 10px; padding: 8px; }
        button { padding: 10px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="app">
        <div id="panel">
            <h2>Kalkulačka</h2>
            <label>Nakládka:</label><br>
            <input type="text" id="pickup" value="B. Staška 76, Domažlice"><br>
            <label>Vykládka:</label><br>
            <input type="text" id="dropoff" placeholder="Adresa vykládky..."><br>
            <button onclick="runCalculation()">Vypočítat trasu</button>
            
            <div id="log" class="error-log"></div>
            
            <div id="results" style="display:none; background: #fff; padding: 10px; margin-top: 10px;">
                <h3>Výsledek</h3>
                <p>Vzdálenost: <span id="dist">0</span> km</p>
                <p>Cena: <span id="price">0</span> Kč</p>
            </div>
        </div>
        <div id="map"></div>
    </div>

<script>
    const map = L.map('map').setView([49.4405, 12.9321], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    const geocoder = L.Control.Geocoder.nominatim();
    let control = null;

    function log(msg, isError = true) {
        const l = document.getElementById('log');
        l.innerText = msg;
        l.className = isError ? 'error-log' : 'success-log';
        console.log(msg);
    }

    async function getCoords(addr) {
        return new Promise((resolve, reject) => {
            geocoder.geocode(addr, (res) => {
                if (res && res.length > 0) resolve(res[0].center);
                else reject("Adresa nenalezena: " + addr);
            });
        });
    }

    async function runCalculation() {
        const p = document.getElementById('pickup').value;
        const d = document.getElementById('dropoff').value;
        
        document.getElementById('results').style.display = 'none';
        log("Hledám souřadnice...");

        try {
            const c1 = await getCoords(p);
            const c2 = await getCoords(d);
            
            log("Souřadnice nalezeny, kreslím...", false);
            
            if (control) map.removeControl(control);
            
            control = L.Routing.control({
                waypoints: [c1, c2],
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' })
            }).addTo(map);

            control.on('routesfound', function(e) {
                const km = (e.routes[0].summary.totalDistance / 1000).toFixed(1);
                const price = Math.round((km * 13) + 20);
                document.getElementById('dist').innerText = km;
                document.getElementById('price').innerText = price;
                document.getElementById('results').style.display = 'block';
                log("Trasa spočítána!", false);
            });

        } catch (err) {
            log("CHYBA: " + err);
        }
    }
</script>
</body>
</html>
