<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistická Kalkulačka</title>
    
    <!-- Leaflet CSS a JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        html, body { height: 100%; margin: 0; padding: 0; }
        * { box-sizing: border-box; font-family: sans-serif; }
        .container { display: flex; height: 100vh; padding: 20px; gap: 20px; }
        .panel { flex: 1; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow-y: auto; }
        .map-container { flex: 1.5; border-radius: 12px; overflow: hidden; }
        #map { width: 100%; height: 100%; }
        /* Ostatní styly zůstávají stejné jako ve vašem původním návrhu */
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #2563eb; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h1>Kalkulačka přepravy</h1>
        <label>Nakládka</label>
        <input type="text" id="pickup" placeholder="Zadejte adresu...">
        <label>Vykládka</label>
        <input type="text" id="destination" placeholder="Zadejte adresu...">
        <button onclick="calculateRoute()">Spočítat</button>
        <div id="results" style="margin-top:20px;"></div>
    </div>
    <div class="map-container">
        <div id="map"></div>
    </div>
</div>

<script>
    // Inicializace mapy (střed Domažlice)
    var map = L.map('map').setView([49.4405, 12.9321], 13);

    // Přidání vrstvy OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Poznámka: Leaflet sám o sobě neumí adresy (geocoding) ani trasování (routing)
    // bez externích služeb (např. Nominatim nebo OSRM).
    // Pro jednoduchou kalkulačku bez API klíče je toto nejčistší cesta.
    
    function calculateRoute() {
        alert("Leaflet je připraven. Pro výpočet trasy a geokódování adres bez API klíče byste museli implementovat volání na Nominatim API nebo OSRM.");
    }
</script>

</body>
</html>
