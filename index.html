<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistická Kalkulačka Trasy a Ceny</title>
    <script src="https://api.mapy.cz/loader.js?key=rl9Uzfp9bc8IWYM2DARh3pOHJO4Y65LoMOnGoPJjgAw"></script>
    
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 20px; background-color: #f5f7fb; color: #333; }
        .container { display: flex; max-width: 1200px; margin: 0 auto; gap: 20px; height: calc(100vh - 40px); }
        .panel { flex: 1; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow-y: auto; }
        .map-container { flex: 1.5; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; }
        #map { width: 100%; height: 100%; }
        h1 { margin-top: 0; color: #1e293b; font-size: 24px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #475569; font-size: 14px; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; }
        input:disabled { background-color: #f1f5f9; color: #64748b; cursor: not-allowed; }
        .btn-add { background: none; border: none; color: #2563eb; font-weight: 600; cursor: pointer; padding: 5px 0; font-size: 14px; text-align: left; }
        .btn-add:hover { text-decoration: underline; }
        .btn-calc { background: #2563eb; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: background 0.2s; }
        .btn-calc:hover { background: #1d4ed8; }
        .results { margin-top: 20px; padding: 15px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px; display: none; }
        .results h3 { margin: 0 0 10px 0; color: #166534; font-size: 18px; }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px dashed #bbf7d0; }
        .result-row:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .result-label { color: #14532d; font-weight: 500; font-size: 15px; }
        .route-info { font-size: 18px; font-weight: bold; color: #14532d; }
        .price-info { font-size: 24px; font-weight: 800; color: #15803d; }
        .note { font-size: 12px; color: #64748b; margin-top: 12px; line-height: 1.4; border-top: 1px solid #e2e8f0; padding-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h1>Kalkulačka přepravy</h1>
        
        <div class="form-group">
            <label>Základna (Výjezd vozidla)</label>
            <input type="text" value="Domažlice, B. Staška 76" disabled>
        </div>

        <div class="form-group">
            <label>1. Místo nakládky *</label>
            <input type="text" id="pickup" placeholder="Začněte psát adresu nakládky..." required>
        </div>

        <div class="form-group" id="stop1-group" style="display: none;">
            <label>Zastávka 1 (Volitelná)</label>
            <input type="text" id="stop1" placeholder="Začněte psát adresu zastávky...">
        </div>

        <div class="form-group" id="stop2-group" style="display: none;">
            <label>Zastávka 2 (Volitelná)</label>
            <input type="text" id="stop2" placeholder="Začněte psát adresu zastávky...">
        </div>

        <button class="btn-add" id="add-stop-btn" onclick="addStop()">+ Přidat zastávku</button>

        <div class="form-group" style="margin-top: 10px;">
            <label>Cíl / Vykládka *</label>
            <input type="text" id="destination" placeholder="Začněte psát adresu vykládky..." required>
        </div>

        <div class="form-group">
            <label>Návrat vozidla</label>
            <input type="text" value="Domažlice, B. Staška 76" disabled>
        </div>

        <button class="btn-calc" onclick="calculateRoute()">Spočítat cenu cesty</button>

        <div class="results" id="results-box">
            <h3>Výsledek výpočtu</h3>
            <div class="result-row">
                <span class="result-label">Celková vzdálenost:</span>
                <span class="route-info" id="total-distance">0 km</span>
            </div>
            <div class="result-row" style="align-items: center;">
                <span class="result-label">Celková cena jízdného:</span>
                <span class="price-info" id="total-price">0 Kč</span>
            </div>
            <div class="note">
                Vzdálenost i cena jsou počítány za celé uzavřené kolečko ze základny zpět na základnu.<br>
                <strong>Sazba:</strong> 13 Kč / km + fixní nástupní poplatek 20 Kč.
            </div>
        </div>
    </div>

    <div class="map-container">
        <div id="map"></div>
    </div>
</div>

<script>
    // Globální proměnné – vytvoříme je prázdné, SMap do nich bezpečně přiřadíme až uvnitř initMap
    let baseCoords;
    let map, layerMarkers, layerGeometry;
    let stopCount = 0;

    // --- NASTAVENÍ CENOTVORBY ---
    const PRICE_PER_KM = 13;   // Cena za 1 km cesty
    const BASE_FEE = 20;       // Jednorázový nástupní poplatek

    // Struktura pro uložení vybraných souřadnic z našeptávačů
    let routePoints = {
        baseStart: null,
        pickup: null,
        stop1: null,
        stop2: null,
        destination: null,
        baseEnd: null
    };

    // TATO FUNKCE SE SPUSTÍ BEZPEČNĚ AŽ VE CHVÍLI, KDY SEZNAM HLÁSÍ "KÓD STAŽEN"
    function initMap() {
        baseCoords = SMap.Coords.fromWGS84(12.932068, 49.440478);
        
        routePoints.baseStart = baseCoords;
        routePoints.baseEnd = baseCoords;

        map = new SMap(JAK.gel("map"), baseCoords, 10);
        map.addDefaultControls();
        
        layerMarkers = new SMap.Layer.Marker();
        layerGeometry = new SMap.Layer.Geometry();
        map.addLayer(layerMarkers).enable();
        map.addLayer(layerGeometry).enable();

        // Přidání fixního špendlíku základny
        let baseMarker = new SMap.Marker(baseCoords, "Základna", {title: "Základna Domažlice"});
        layerMarkers.addMarker(baseMarker);

        // Aktivace našeptávačů pro jednotlivá pole
        setupSuggest("pickup", "pickup");
        setupSuggest("stop1", "stop1");
        setupSuggest("stop2", "stop2");
        setupSuggest("destination", "destination");

        // Aktivace klikání do mapy
        map.getSignals().addListener(window, "map-click", function(e) {
            let coords = SMap.Coords.fromEvent(e.data.event, map);
            handleMapClick(coords);
        });
    }

    // Tímto oficiálním příkazem Mapy.cz řekneme zavaděči, aby načetl doplňky a pak spustil funkci initMap
    // Tímto oficiálním příkazem Mapy.cz řekneme zavaděči, aby načetl doplňky asynchronně a pak spustil funkci initMap
Loader.async = true;
Loader.load(null, {suggest: true, route: true}, initMap);

    // Funkce pro navázání našeptávače na textové pole
    function setupSuggest(inputId, pointKey) {
        let input = JAK.gel(inputId);
        let suggest = new SMap.Suggest(input, {
            provider: new SMap.SuggestProvider({
                updateInputs: true,
                bounds: "48.5,12.0|51.1,18.9"
            })
        });
        
        suggest.addListener("select", function(e) {
            routePoints[pointKey] = SMap.Coords.fromWGS84(e.data.longitude, e.data.latitude);
            updateMapMarkers();
        });
    }

    // Zobrazení políček pro zastávky
    function addStop() {
        if (stopCount === 0) {
            document.getElementById("stop1-group").style.display = "block";
            stopCount++;
        } else if (stopCount === 1) {
            document.getElementById("stop2-group").style.display = "block";
            document.getElementById("add-stop-btn").style.display = "none";
            stopCount++;
        }
    }

    // Kliknutí do mapy automaticky doplní souřadnice do prvního prázdného povinného pole
    function handleMapClick(coords) {
        if (!routePoints.pickup) {
            routePoints.pickup = coords;
            reverseGeocode(coords, "pickup");
        } else if (!routePoints.destination) {
            routePoints.destination = coords;
            reverseGeocode(coords, "destination");
        } else if (stopCount > 0 && !routePoints.stop1) {
            routePoints.stop1 = coords;
            reverseGeocode(coords, "stop1");
        } else if (stopCount > 1 && !routePoints.stop2) {
            routePoints.stop2 = coords;
            reverseGeocode(coords, "stop2");
        }
    }

    // Získání textové adresy ze souřadnic při kliku do mapy
    function reverseGeocode(coords, inputId) {
        new SMap.Geocoder(coords, function(geocoder) {
            let results = geocoder.getResults();
            if (results && results.items.length > 0) {
                document.getElementById(inputId).value = results.items[0].label;
            }
            updateMapMarkers();
        });
    }

    // Překreslení špendlíků na mapě podle zadaných dat
    function updateMapMarkers() {
        layerMarkers.clear();
        layerMarkers.addMarker(new SMap.Marker(baseCoords, "Základna", {title: "Základna Domažlice"}));
        
        if (routePoints.pickup) layerMarkers.addMarker(new SMap.Marker(routePoints.pickup, "A", {title: "Nakládka"}));
        if (routePoints.stop1) layerMarkers.addMarker(new SMap.Marker(routePoints.stop1, "B", {title: "Zastávka 1"}));
        if (routePoints.stop2) layerMarkers.addMarker(new SMap.Marker(routePoints.stop2, "C", {title: "Zastávka 2"}));
        if (routePoints.destination) layerMarkers.addMarker(new SMap.Marker(routePoints.destination, "D", {title: "Cíl / Vykládka"}));
    }

    // VÝPOČET TRASY A CENY (Celé kolečko)
    function calculateRoute() {
        if (!routePoints.pickup || !routePoints.destination) {
            alert("Prosím vyplňte minimálně Místo nakládky a Cíl/Vykládku.");
            return;
        }

        let points = [routePoints.baseStart, routePoints.pickup];
        if (routePoints.stop1) points.push(routePoints.stop1);
        if (routePoints.stop2) points.push(routePoints.stop2);
        points.push(routePoints.destination);
        points.push(routePoints.baseEnd);

        new SMap.Route(points, function(route) {
            let distanceInMeters = route.getResults().length;
            let distanceInKm = distanceInMeters / 1000;
            
            // --- LOGIKA VÝPOČTU CENY ---
            let totalPrice = Math.round((distanceInKm * PRICE_PER_KM) + BASE_FEE);
            
            // Zobrazení výsledků v panelu
            document.getElementById("total-distance").innerText = distanceInKm.toFixed(1) + " km";
            document.getElementById("total-price").innerText = totalPrice.toLocaleString('cs-CZ') + " Kč";
            document.getElementById("results-box").style.display = "block";

            // Vykreslení čáry trasy do mapy
            layerGeometry.clear();
            let coords = route.getResults().geometry;
            let geometry = new SMap.Geometry(SMap.GEOMETRY_POLYLINE, null, coords, {color: "#2563eb", width: 5});
            layerGeometry.addGeometry(geometry);
            
            map.zoomOut(); 
        }, {criterion: "fast"});
    }
</script>

</body>
</html>
